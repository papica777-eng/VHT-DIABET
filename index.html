            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(181, 95, 230, 0.05), transparent);
            transition: 0.8s;

            left: 100%;
        }

            transform: translateY(-2px);

            border-color: var(--neon-emerald);
            box-shadow: 0 0 35px var(--neon-emerald-glow);
        }

        .glass-card.glow-red:hover {
            border-color: var(--neon-red);
            box-shadow: 0 0 35px var(--neon-red-glow);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            position: relative;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            border: 2px solid currentColor;
            opacity: 0;
            animation: ripple 1.8s infinite ease-out;
        }

        @keyframes ripple {
            0% { transform: scale(0.6); opacity: 1; }
            100% { transform: scale(2.2); opacity: 0; }

        // SVG Render helpers
        const width = 600;
        const height = 240;
        const padding = 35;

        function getSvgCoords(val, idx, minVal, maxVal) {
            const x = padding + (idx / 12) * (width - padding * 2);
            const y = height - padding - ((val - minVal) / (maxVal - minVal)) * (height - padding * 2);
            return { x, y };
        }

        function buildSvgPath(data, minVal, maxVal) {
            return data.map((d, i) => {
                const { x, y } = getSvgCoords(d.val, i, minVal, maxVal);
                return `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)} ${y.toFixed(1)}`;
            }).join(' ');
        }

        function buildSvgAreaPath(data, minVal, maxVal) {
            const first = getSvgCoords(data[0].val, 0, minVal, maxVal);
            const last = getSvgCoords(data[data.length - 1].val, data.length - 1, minVal, maxVal);
            let path = buildSvgPath(data, minVal, maxVal);
            return `${path} L ${last.x.toFixed(1)} ${height - padding} L ${first.x.toFixed(1)} ${height - padding} Z`;
        }

        function clearActiveTerminal() {
            if (commandInterval) {
                clearInterval(commandInterval);
                commandInterval = null;

            state.terminalHistory[state.activeSpec] = [];
            renderTerminalHistory(state.activeSpec);

        function generateSpecsLabHtml() {

                        </div>

        // 60FPS Interactive HTML5 Canvas Neural Lattice Background
        let particles = [];
        let pulses = [];
        let telemetryRain = [];
        let mouse = { x: null, y: null };
        let canvasAnimId = null;

        class Particle {
            constructor(canvas) {
                this.canvas = canvas;
                this.reset();
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
            }
            reset() {
                this.x = Math.random() * this.canvas.width;
                this.y = Math.random() * this.canvas.height;
                this.vx = (Math.random() - 0.5) * 0.35;
                this.vy = (Math.random() - 0.5) * 0.35;
                this.radius = Math.random() * 1.5 + 1.2;
                this.color = Math.random() > 0.5 ? 'rgba(0, 240, 255, 0.6)' : 'rgba(181, 95, 230, 0.6)';
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Mouse Repulsion Distortion Field
                if (mouse.x !== null && mouse.y !== null) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 180) {
                        const force = (180 - dist) / 180;
                        const angle = Math.atan2(dy, dx);
                        const pushX = Math.cos(angle) * force * 1.6;
                        const pushY = Math.sin(angle) * force * 1.6;
                        this.x += pushX;
                        this.y += pushY;
                    }
                }

                // Smooth viewport wrapping boundaries
                if (this.x < -20) this.x = this.canvas.width + 20;
                if (this.x > this.canvas.width + 20) this.x = -20;
                if (this.y < -20) this.y = this.canvas.height + 20;
                if (this.y > this.canvas.height + 20) this.y = -20;
            }
            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        class Pulse {
            constructor(fromNode, toNode) {
                this.from = fromNode;
                this.to = toNode;
                this.progress = 0;
                this.speed = Math.random() * 0.015 + 0.008;
            }
            update() {
                this.progress += this.speed;
            }
            draw(ctx) {
                const px = this.from.x + (this.to.x - this.from.x) * this.progress;
                const py = this.from.y + (this.to.y - this.from.y) * this.progress;
                
                ctx.beginPath();
                ctx.arc(px, py, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = '#00f0ff';
                ctx.shadowColor = '#00f0ff';
                ctx.shadowBlur = 8;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class RainTelemetry {
            constructor(canvas) {
                this.canvas = canvas;
                this.reset();
                this.y = Math.random() * canvas.height;
            }
            reset() {
                this.x = Math.random() * this.canvas.width;
                this.y = -40;
                this.vy = Math.random() * 0.6 + 0.25;
                this.alpha = Math.random() * 0.08 + 0.01;
                this.fontSize = Math.floor(Math.random() * 4) + 9;
                const codes = [
                    "0101", "VHT_DIABET", "KNOX_TEE", "RUST_NAPI", "PQC_ML-KEM", 
                    "SECURE", "determ_logic", "0x41_45_54", "AVX-512", "7.83Hz", 
                    "zero-GC", "steel_runtime", "NIS2_COMPLIANT", "EU_SOVEREIGN"
                ];
                this.text = codes[Math.floor(Math.random() * codes.length)];
            }
            update() {
                this.y += this.vy;
                if (this.y > this.canvas.height + 40) {
                    this.reset();
                }
            }
            draw(ctx) {
                ctx.font = `${this.fontSize}px 'JetBrains Mono', monospace`;
                ctx.fillStyle = `rgba(181, 95, 230, ${this.alpha})`;
                ctx.fillText(this.text, this.x, this.y);
            }
        }

        function initCyberCanvas() {
            const canvas = document.getElementById('cyber-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            window.addEventListener('mouseout', () => {
                mouse.x = null;
                mouse.y = null;
            });

            const particleCount = 80;
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(canvas));
            }
            
            const rainCount = 20;
            telemetryRain = [];
            for (let i = 0; i < rainCount; i++) {
                telemetryRain.push(new RainTelemetry(canvas));
            }

            function animateCanvas() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                telemetryRain.forEach(rain => {
                    rain.update();
                    rain.draw(ctx);
                });

                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < 115) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(181, 95, 230, ${0.12 * (1 - dist / 115)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();

                            if (pulses.length < 18 && Math.random() < 0.0003) {
                                pulses.push(new Pulse(particles[i], particles[j]));
                            }
                        }
                    }

                    if (mouse.x !== null && mouse.y !== null) {
                        const dx = particles[i].x - mouse.x;
                        const dy = particles[i].y - mouse.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < 160) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(mouse.x, mouse.y);
                            ctx.strokeStyle = `rgba(0, 240, 255, ${0.2 * (1 - dist / 160)})`;
                            ctx.lineWidth = 0.7;
                            ctx.stroke();
                        }
                    }

                    particles[i].update();
                    particles[i].draw(ctx);
                }

                pulses = pulses.filter(p => p.progress < 1);
                pulses.forEach(p => {
                    p.update();
                    p.draw(ctx);
                });

                canvasAnimId = requestAnimationFrame(animateCanvas);
            }
            if (canvasAnimId) cancelAnimationFrame(canvasAnimId);
            animateCanvas();
        }

        // Run Vanilla engine
        window.addEventListener("DOMContentLoaded", () => {
            renderVanillaHUD();
            addLogEntry("init_complete");
            initCyberCanvas();
        });
    </script>
